<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Employee Portal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f5f7fb;
        }

        .card{
            border:none;
            border-radius:15px;
            box-shadow:0 10px 25px rgba(0,0,0,.08);
        }

        h2{
            font-weight:bold;
        }

        .table{
            margin-top:20px;
        }

        .btn-primary{
            width:100%;
        }
    </style>
</head>

<body>

<div class="container mt-5">

<div class="card p-4">

<h2 class="text-center mb-4">
Enterprise Employee Portal
</h2>

<form action="/add" method="POST">

<div class="row">

<div class="col-md-5">
<input
class="form-control"
type="text"
name="name"
placeholder="Employee Name"
required>
</div>

<div class="col-md-5">
<input
class="form-control"
type="text"
name="department"
placeholder="Department"
required>
</div>

<div class="col-md-2">
<button class="btn btn-primary">
Add
</button>
</div>

</div>

</form>

<table class="table table-striped table-hover mt-4">

<thead class="table-dark">

<tr>

<th>ID</th>

<th>Name</th>

<th>Department</th>

</tr>

</thead>

<tbody>

{% for employee in employees %}

<tr>

<td>{{ employee[0] }}</td>

<td>{{ employee[1] }}</td>

<td>{{ employee[2] }}</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>

</body>
</html>
